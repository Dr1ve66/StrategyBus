{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="mb-4 d-flex justify-content-between align-items-start flex-wrap gap-3">
      <div>
        <h1 class="display-6 fw-bold mb-1">Новый запрос</h1>
        <p class="text-muted mb-0">
          Заполните информацию о Клиенте. Агент 1 предложит три варианта Стратегии
          для выбора, редактирования или повторной генерации.
        </p>
      </div>

      <button
        type="button"
        class="btn btn-outline-secondary"
        id="toggle-product-btn"
        aria-expanded="false"
        aria-controls="product-field-wrapper"
      >
        продукт
      </button>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <form method="post" action="{{ url_for('process') }}" data-ai-form>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="company_size">
              1. Размер компании
            </label>
            <select
              id="company_size"
              class="form-select"
              name="company_size"
              required
            >
              <option value="">Выберите сегмент</option>
              <option value="Микробизнес (до 15 сотрудников, выручка до 120 млн ₽/год)">Микробизнес</option>
              <option value="Малый бизнес (15–100 сотрудников, выручка до 800 млн ₽/год)">Малый бизнес</option>
              <option value="Средний бизнес (100–250 сотрудников, выручка до 2 млрд ₽/год)">Средний бизнес</option>
              <option value="Крупный бизнес (свыше 250 сотрудников, выручка от 2 млрд ₽/год)">Крупный бизнес</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="company_industry">
              2. Отрасль компании
            </label>
            <input
              id="company_industry"
              class="form-control"
              type="text"
              name="company_industry"
              required
              placeholder="Например: оптовая торговля, производство, логистика"
            >
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="situation_description">
              3. Описание ситуации у компании
            </label>
            <textarea
              id="situation_description"
              class="form-control input-textarea"
              name="situation_description"
              rows="5"
              required
              placeholder="Опишите ситуацию максимально подробно"
            ></textarea>
          </div>

          <div class="mb-3 d-none" id="product-field-wrapper">
            <label class="form-label fw-semibold" for="product_name">
              Продукт
            </label>
            <input
              id="product_name"
              class="form-control"
              type="text"
              name="product_name"
              placeholder="Например: кредит"
            >
            <div class="form-text">
              Поле не обязательно для заполнения
            </div>
          </div>

          <div class="d-flex justify-content-end mt-4">
            <button class="btn btn-primary btn-lg" type="submit">
              Отправить запрос →
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const toggleBtn = document.getElementById('toggle-product-btn');
    const wrapper = document.getElementById('product-field-wrapper');

    if (toggleBtn && wrapper) {
      toggleBtn.addEventListener('click', function () {
        const isHidden = wrapper.classList.contains('d-none');

        if (isHidden) {
          wrapper.classList.remove('d-none');
          toggleBtn.setAttribute('aria-expanded', 'true');
        } else {
          wrapper.classList.add('d-none');
          toggleBtn.setAttribute('aria-expanded', 'false');
        }
      });
    }
  });
</script>
{% endblock %}
