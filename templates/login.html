{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h3 mb-2 text-center">Вход</h1>
        <p class="text-muted text-center mb-4">Логин всегда: <strong>admin</strong></p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Логин</label>
            <input class="form-control form-control-lg" name="username" value="admin" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Пароль</label>
            <input class="form-control form-control-lg" type="password" name="password" required autofocus>
          </div>
          <button class="btn btn-primary btn-lg w-100" type="submit">Войти</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
