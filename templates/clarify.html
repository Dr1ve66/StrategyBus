{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 700px;">

    <h1 style="margin-bottom: 8px;">Уточняющие вопросы</h1>
    <p style="color:#6b7280; margin-bottom: 24px;">
        Ответьте на несколько вопросов — это поможет сформировать более точные рекомендации
    </p>

    <form method="POST">

        {% for q in questions %}
            <div class="question-card" style="
                background: #ffffff;
                padding: 16px;
                border-radius: 12px;
                margin-bottom: 16px;
                border: 1px solid #e5e7eb;
            ">

                <div class="question-title" style="
                    font-weight: 600;
                    margin-bottom: 10px;
                ">
                    {{ loop.index }}. {{ q.question }}
                </div>

                <select name="{{ q.key }}" class="select" required
                        style="width:100%; padding:10px; border-radius:8px; border:1px solid #d1d5db;"
                        onchange="toggleCustomInput(this, '{{ q.key }}')">

                    <option value="" disabled selected>Выберите вариант</option>

                    {% for option in q.options %}
                        <option value="{{ option }}">{{ option }}</option>
                    {% endfor %}

                    <option value="custom">Свой вариант…</option>
                </select>

                <input type="text"
                       name="{{ q.key }}_custom"
                       class="custom-input"
                       placeholder="Введите свой вариант"
                       style="
                           display:none;
                           margin-top:10px;
                           width:100%;
                           padding:10px;
                           border-radius:8px;
                           border:1px solid #d1d5db;
                       ">

            </div>
        {% endfor %}

        <div class="actions" style="margin-top: 24px;">
            <button type="submit" class="btn-primary" style="
                width:100%;
                padding:12px;
                border-radius:10px;
                font-weight:600;
            ">
                Продолжить
            </button>
        </div>

    </form>
</div>

<script>
function toggleCustomInput(select, key) {
    const input = document.querySelector(`input[name="${key}_custom"]`);

    if (select.value === "custom") {
        input.style.display = "block";
        input.required = true;
        input.focus();
    } else {
        input.style.display = "none";
        input.required = false;
        input.value = "";
    }
}
</script>
{% endblock %}
